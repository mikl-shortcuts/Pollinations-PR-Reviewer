name: "Pollinations PR Reviewer"
description: "AI-powered code reviews for Pull Requests using Pollinations API"
author: "mikl-shortcuts"

branding:
  icon: "eye"
  color: "purple"

inputs:
  pollinations-api-key:
    description: "Your Pollinations API key from https://enter.pollinations.ai"
    required: true
  github-token:
    description: "GitHub token"
    required: true
    default: "${{ github.token }}"
  model:
    description: "AI model (openai, mistral, llama, etc.)"
    required: false
    default: "openai"
  max-diff-length:
    description: "Max diff characters"
    required: false
    default: "30000"
  exclude-files:
    description: "Comma-separated patterns to exclude"
    required: false
    default: "*.lock,*.min.js,*.min.css,package-lock.json,yarn.lock,pnpm-lock.yaml,*.map,*.svg,*.png,*.jpg,*.gif,*.ico"
  custom-prompt:
    description: "Additional instructions for reviewer"
    required: false
    default: ""
  post-as-check:
    description: "Post review as a GitHub check run"
    required: false
    default: "true"

outputs:
  review:
    description: "Generated review text"
  verdict:
    description: "Review verdict (APPROVE, REQUEST_CHANGES, or NEUTRAL)"

runs:
  using: "node20"
  main: "dist/index.js"